name: ci

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: python -m pip install -e ".[test]"

      - name: Run tests
        run: pytest

      - name: Run CLI demo
        run: incident-log-summarizer examples/k8s_incident.log --format markdown

      - name: Build Docker image
        run: docker build -t incident-log-summarizer:test .
